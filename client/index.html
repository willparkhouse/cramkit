<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0f" />
    <meta name="description" content="AI-powered exam revision for University of Birmingham students" />
    <title>Cramkit — AI exam revision</title>
    <script>
      // Apply stored theme synchronously before React mounts to avoid flash
      (function () {
        try {
          var stored = localStorage.getItem('cramkit_theme') || 'dark';
          var resolved = stored === 'system'
            ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
            : stored;
          document.documentElement.classList.toggle('dark', resolved === 'dark');
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
